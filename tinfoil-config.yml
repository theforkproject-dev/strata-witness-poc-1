cvm-version: 0.7.5
cpus: 2
memory: 8192

containers:
  - name: "witness"
    image: "ghcr.io/theforkproject-dev/strata-ebo-turnstile:tinfoil-witness-poc-001@sha256:06d996936e2885d729b5d6bd3e6d465f75e60ff2c1f908f77ed4ded593df36a0"
    env:
      - PORT: "8080"
      - HOST: "0.0.0.0"
      - TURNSTILE_DATA_DIR: "/mnt/ramdisk/turnstile"
      - WITNESS_ID: "strata-witness-poc-1"
      - WITNESS_KEY_ID: "witness:strata-witness-poc-1:epoch-001"
      - WITNESS_KEY_FILE: "/mnt/ramdisk/turnstile/witness.key.json"
      - WITNESS_WAL: "/mnt/ramdisk/turnstile/witness.wal.jsonl"
      - WITNESS_SIGN_REQUESTS_ENABLED: "true"
      - WITNESS_LEGACY_SIGN_ENABLED: "false"
      - WITNESS_GUARD_LOG_BACKEND: "s3-object-lock"
      - AWS_REGION: "us-east-2"
      - WITNESS_S3_GUARD_BUCKET: "strata-witness-poc-guard-log-345337478194"
      - WITNESS_S3_GUARD_PREFIX: "witnesses/strata-witness-poc-1"
      - WITNESS_S3_OBJECT_LOCK_MODE: "GOVERNANCE"
      - WITNESS_S3_RETENTION_MINUTES: "60"
      - WITNESS_EPOCH_ID: "wit_epoch_tinfoil_poc_001"
      - REGISTRY_EPOCH_ID: "registry_epoch_tinfoil_poc_001"
      - WITNESS_EXPECTED_WORKFLOW_ID: "demo.payment"
      - WITNESS_ATTESTATION_REF: "https://strata-witness-poc-1.amotivv.containers.tinfoil.dev/.well-known/tinfoil-attestation"
      - WITNESS_REGISTRY_EPOCH_URL: "https://raw.githubusercontent.com/theforkproject-dev/strata-witness-poc-1/main/registry-epoch.json"
      - WITNESS_REGISTRY_TRUST_ANCHORS_URL: "https://raw.githubusercontent.com/theforkproject-dev/strata-witness-poc-1/main/registry-trust-anchors.json"
      - WITNESS_REGISTRY_SOURCE_TIMEOUT_MS: "10000"
    secrets:
      - AWS_ACCESS_KEY_ID
      - AWS_SECRET_ACCESS_KEY
    command: ["node", "bin/turnstile-witness.js"]
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8080/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    restart: always

shim:
  upstream-port: 8080
  paths:
    - /health
    - /v1/public-key
    - /v1/witness-info
    - /v1/sign-request
